services:
  # API NestJS
  - type: web
    name: washapp-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: api
    buildCommand: npm install --include=dev && npx prisma generate
    startCommand: npm run build && npx prisma db push && node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: washapp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 3001

  # Web Next.js
  - type: web
    name: washapp-web
    runtime: node
    region: frankfurt
    plan: free
    rootDir: web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: washapp-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: washapp-db
    region: frankfurt
    plan: free
    databaseName: washapp
    user: washapp
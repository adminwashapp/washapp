services:
  # API NestJS
  - type: web
    name: washapp-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: api
    buildCommand: npm install --include=dev && npx prisma generate
    startCommand: npx prisma db push && NODE_OPTIONS=--max-old-space-size=460 npx ts-node --transpile-only -r tsconfig-paths/register src/main.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: washapp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://washapp-web.onrender.com

  # Web Next.js
  - type: web
    name: washapp-web
    runtime: node
    region: frankfurt
    plan: free
    rootDir: web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://washapp-api.onrender.com/api

databases:
  - name: washapp-db
    region: frankfurt
    plan: free
    databaseName: washapp
    user: washapp